<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政治理论热词派🔥</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --card-bg: #111827;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --border: #1e293b;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        [data-theme="light"] {
            --bg: #f0f7ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        [data-theme="skeu"] {
            --bg: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
            --text: #e8e8ff;
            --text-secondary: #8888aa;
            --accent: #7c4dff;
            --success: #00e676;
            --danger: #ff5252;
            --border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* 流动光晕层 */
        [data-theme="skeu"] .glow-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        [data-theme="skeu"] .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform;
        }
        [data-theme="skeu"] .glow-red {
            width: 380px; height: 380px;
            top: -80px; left: -100px;
            background: radial-gradient(circle, rgba(255,70,80,0.6), rgba(200,30,60,0.1) 70%);
            animation: flowRed 4.5s infinite alternate ease-in-out;
        }
        [data-theme="skeu"] .glow-blue {
            width: 450px; height: 450px;
            bottom: -120px; right: -120px;
            background: radial-gradient(circle, rgba(50,140,255,0.5), rgba(20,60,200,0.05) 70%);
            animation: flowBlue 5.5s infinite alternate ease-in-out;
        }
        [data-theme="skeu"] .glow-purple {
            width: 200px; height: 200px;
            top: 40%; left: 50%;
            background: radial-gradient(circle, rgba(180,100,255,0.25), transparent 70%);
            animation: flowPurple 6s infinite alternate ease-in-out;
        }
        @keyframes flowRed {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(120px,80px) scale(1.3); }
            50%  { transform: translate(30px,-100px) scale(0.85); }
            75%  { transform: translate(-80px,60px) scale(1.4); }
            100% { transform: translate(-40px,-30px) scale(1.1); }
        }
        @keyframes flowBlue {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(-100px,-90px) scale(1.3); }
            50%  { transform: translate(-40px,120px) scale(0.8); }
            75%  { transform: translate(110px,50px) scale(1.2); }
            100% { transform: translate(20px,-100px) scale(1.4); }
        }
        @keyframes flowPurple {
            0%   { transform: translate(-50%,0) scale(1) rotate(0deg); }
            33%  { transform: translate(-30%,-60px) scale(1.6) rotate(120deg); }
            66%  { transform: translate(-70%,50px) scale(0.7) rotate(240deg); }
            100% { transform: translate(-50%,-20px) scale(1.2) rotate(360deg); }
        }

        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        [data-theme="skeu"] #particles { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

        /* ==================== 首页 ==================== */
        .home-screen { text-align: center; padding-top: 60px; }
        .home-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .home-subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 40px; }
        .big-cards { display: flex; flex-direction: column; gap: 16px; margin-bottom: 30px; }
        .big-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .big-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .big-card-icon { font-size: 3rem; margin-bottom: 12px; }
        .big-card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
        .big-card-count { font-size: 0.875rem; color: var(--accent); }

        /* ==================== 统计浮窗 ==================== */
        .stats-float {
            position: fixed;
            bottom: 76px; left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 20px;
            display: flex; gap: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
            box-shadow: var(--shadow);
            font-size: 0.75rem;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.625rem; color: var(--text-secondary); margin-top: 1px; }

        /* ==================== 换肤按钮 ==================== */
        .theme-switcher {
            position: fixed; bottom: 12px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 4px;
            z-index: 200;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 4px 8px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .theme-btn {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn.active { border-color: transparent; }
        .theme-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px; left: 50%;
            transform: translateX(-50%);
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
        }
        .theme-btn[data-theme="default"] { background: linear-gradient(135deg, #0f172a, #1e293b); }
        .theme-btn[data-theme="light"] { background: linear-gradient(135deg, #f0f7ff, #e2e8f0); border: 2px solid #cbd5e1; }
        .theme-btn[data-theme="skeu"] { background: linear-gradient(135deg, #4a4a6e, #2a2a4e); border: 2px solid #7c4dff; }

        /* ==================== 页面通用 ==================== */
        .page { display: none; }
        .page.active { display: block; }
        .page-header {
            display: flex; align-items: center;
            padding: 16px 0; margin-bottom: 16px;
        }
        .back-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-right: 12px;
            font-size: 1.125rem;
        }
        .page-title { font-size: 1.125rem; font-weight: 700; }
        .page-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        /* ==================== 列表页（年份/期数/文件 通用小卡片）==================== */
        .subject-grid { display: flex; flex-direction: column; gap: 12px; }
        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .subject-card:hover { border-color: var(--accent); }
        .subject-name { font-size: 1rem; font-weight: 600; text-align: center; }
        .subject-count { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; text-align: center; }

        /* ==================== 模式选择 ==================== */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .mode-icon { font-size: 2rem; margin-bottom: 8px; }
        .mode-name { font-size: 0.875rem; font-weight: 600; }
        .mode-desc { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }

        /* ==================== 学习页面 ==================== */
        #page-study { padding-bottom: 140px; overflow-y: auto; }
        .card-container { margin-bottom: 20px; perspective: 1000px; }
        /* 所有卡片统一高度，切换无跳动，内容超出在内部滚动 */
        .card-wrapper {
            position: relative; width:100%;
            height: 260px;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .card-wrapper { height: 200px; }
        }
        .card-inner {
            position: relative; width:100%; height:100%;
            transition: transform 0.6s ease-in-out; transform-style: preserve-3d;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; top:0; left:0; width:100%; height:100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); }
        /* 内容区域：正面短内容居中，长内容可滚动；背面答案始终顶部开始 */
        .card-question {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column;
            justify-content: center;
            font-size: 0.92rem; line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.12) transparent;
        }
        .card-answer {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column;
            justify-content: flex-start;
            padding-top: 20px;
            font-size: 1.05rem; line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.12) transparent;
        }
        .card-question.tall {
            justify-content: flex-start;
            padding-top: 16px;
        }
        .card-answer.tall {
            padding-top: 16px;
        }
        .card-question::-webkit-scrollbar,
        .card-answer::-webkit-scrollbar { width: 4px; }
        .card-question::-webkit-scrollbar-thumb,
        .card-answer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .card-answer b, .card-answer strong { color: var(--accent); }
        .card-answer .answer-body {
            font-size: 0.98rem; line-height: 1.8;
            padding: 12px 14px;
            background: rgba(56,189,248,0.06);
            border-left: 3px solid rgba(56,189,248,0.35);
            border-radius: 0 8px 8px 0;
            color: var(--text);
        }
        [data-theme="light"] .card-answer .answer-body {
            background: #e8f4fd; border-left-color: #3b82f6; color: #1e40af;
        }
        [data-theme="skeu"] .card-answer .answer-body {
            background: rgba(56,189,248,0.1); border-left-color: #7c4dff; color: #e1bee7;
        }
        .card-answer .analysis-section {
            margin-top: 16px; padding: 12px;
            background: rgba(124,77,255,0.08);
            border-left: 3px solid rgba(124,77,255,0.4);
            border-radius: 0 8px 8px 0;
            color: var(--text);
            font-size: 0.85rem; line-height: 1.7;
        }
        [data-theme="light"] .card-answer .analysis-section {
            background: #f3e5f5; border-left-color: #7c4dff; color: #4a148c;
        }
        [data-theme="skeu"] .card-answer .analysis-section {
            background: rgba(124,77,255,0.12); border-left-color: #7c4dff; color: #e1bee7;
        }
        .card-answer .analysis-section .section-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.7rem; font-weight: 700;
            color: #7c4dff; margin-bottom: 8px; letter-spacing: 1px;
        }
        .card-answer .analysis-section .info-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; background: #7c4dff;
            color: white; border-radius: 50%; font-size: 11px; font-weight: 500;
        }
        .card-answer .expansion-section {
            margin-top: 12px; padding-top: 10px;
            border-top: 1px dashed rgba(128,128,128,0.3);
            font-size: 0.85rem; line-height: 1.7;
        }
        .card-answer .section-label {
            font-size: 0.7rem; font-weight: 700;
            color: var(--accent); margin-bottom: 4px; letter-spacing: 1px;
        }

        .card-number {
            position: absolute; top: 14px; right: 16px;
            font-size: 0.7rem; color: rgba(255,255,255,0.25);
            z-index: 2;
        }
        /* 标签（流式布局，在答案内容内部，确保完整显示） */
        .card-tag {
            display: inline-block;
            font-size: 0.7rem; padding: 4px 12px;
            border-radius: 10px; letter-spacing: 2px;
            font-weight: 600; white-space: nowrap;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .card-tag--default {
            background: rgba(80,140,255,0.12); border: 1px solid rgba(80,140,255,0.28); color: #7eb3ff;
        }
        .card-tag--core {
            background: rgba(255,80,80,0.13); border: 1px solid rgba(255,80,80,0.3); color: #ff7b7b;
        }
        .card-tag--tricky {
            background: rgba(255,165,0,0.13); border: 1px solid rgba(255,165,0,0.3); color: #ffa500;
        }
        .card-tag--hard {
            background: rgba(160,100,255,0.13); border: 1px solid rgba(160,100,255,0.3); color: #b07cff;
        }
        .card-difficulty {
            position: absolute; bottom: 14px; right: 16px;
            font-size: 0.7rem; letter-spacing: 3px;
            color: rgba(255,255,255,0.2); z-index: 2;
        }

        .btn-group { display: flex; gap: 8px; justify-content: space-between; }
        .btn {
            flex: 1; padding: 10px 16px;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text);
            cursor: pointer; font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .btn:hover { border-color: var(--accent); }

        /* ==================== 背诵模式 ==================== */
        .recite-list { display: flex; flex-direction: column; gap: 8px; }
        .recite-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            cursor: pointer;
            max-height: 200px; overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .recite-item.expanded { max-height: 800px; }
        .recite-q { font-size: 0.9375rem; font-weight: 600; margin-bottom: 4px; }
        .recite-a {
            font-size: 0.875rem; color: var(--text-secondary);
            line-height: 1.7;
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease, margin-top 0.2s ease;
        }
        .recite-item.expanded .recite-a { max-height: 600px; margin-top: 8px; }
        .recite-a strong { color: var(--accent); }

        .footer {
            text-align: center; padding: 30px 0;
            color: var(--text-secondary); font-size: 0.75rem;
        }

        /* ==================== 拟物化皮肤 ==================== */
        body[data-theme="skeu"] {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at 30% 20%, #1a1a2e 0%, #0f0f1a 50%, #000000 100%);
        }
        [data-theme="skeu"] .big-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: visible;
        }
        [data-theme="skeu"] .big-card::before {
            content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(8px);
            pointer-events: none; opacity: 0.7;
        }
        [data-theme="skeu"] .big-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.3);
        }
        [data-theme="skeu"] .big-card::after,
        [data-theme="skeu"] .subject-card::after,
        [data-theme="skeu"] .mode-card::after {
            content: ''; position: absolute;
            top: 100%; left: 8%; width: 84%; height: 18px; margin-top: -2px;
            background: inherit;
            filter: blur(14px) brightness(0.4);
            opacity: 0.35; transform: scaleY(-0.25);
            transform-origin: top; pointer-events: none; border-radius: 50%;
        }
        [data-theme="skeu"] .card-front,
        [data-theme="skeu"] .card-back {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.3);
            /* 布局由 base CSS 控制（position:absolute + overflow:hidden），此处仅保留 skeu 视觉样式 */
        }
        [data-theme="skeu"] .card-front::before,
        [data-theme="skeu"] .card-back::before {
            content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(8px);
            pointer-events: none; opacity: 0.7;
        }
        [data-theme="skeu"] .btn {
            background: rgba(124,77,255,0.3);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(124,77,255,0.5); border-radius: 12px;
            color: #ffffff; font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }
        [data-theme="skeu"] .btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            border-radius: 12px 12px 0 0; pointer-events: none;
        }
        [data-theme="skeu"] .btn:active {
            transform: translateY(2px);
            background: rgba(124,77,255,0.5);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.3);
        }
        [data-theme="skeu"] .subject-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: visible;
        }
        [data-theme="skeu"] .subject-card::before {
            content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(8px);
            pointer-events: none; opacity: 0.7;
        }
        [data-theme="skeu"] .mode-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: visible;
        }
        [data-theme="skeu"] .mode-card::before {
            content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(8px);
            pointer-events: none; opacity: 0.7;
        }
        [data-theme="skeu"] .recite-item {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 32px; border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 30px 80px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: visible;
        }
        [data-theme="skeu"] .recite-item::before {
            content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(8px);

</head>
<body>

        <!-- ==================== 统计浮窗 ==================== -->
        <div class="stats-float" id="stats-float" style="display:none;">
            <div class="stat-item">

            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-total">10</div>
                <div class="stat-label">总计</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-known" style="color:var(--success);">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-wrong" style="color:var(--danger);">0</div>
                <div class="stat-label">错题</div>
            </div>

        <!-- ==================== 换肤按钮 ==================== -->
        <div class="theme-switcher" id="theme-switcher">
            <div class="theme-btn active" data-theme="default" title="深蓝科技"></div>
            <div class="theme-btn" data-theme="light" title="晴空蓝"></div>
            <div class="theme-btn" data-theme="skeu" title="拟物化"></div>

    <script src="data-theory.js"></script>
    <script src="data-qiushi.js"></script>
    <script src="data-hot.js"></script>
    <script>
    // ==================== 主题切换 ====================
    (function() {
        var saved = localStorage.getItem('zzll_theme') || 'default';
        if (saved !== 'default') document.body.setAttribute('data-theme', saved);
        document.querySelectorAll('.theme-btn').forEach(function(b) {
            b.classList.toggle('active', b.dataset.theme === saved);
        });
    })();

    function switchTheme(name) {
        document.body.setAttribute('data-theme', name === 'default' ? '' : name);
        localStorage.setItem('zzll_theme', name);
        document.getElementById('glow-container').style.display = (name === 'skeu') ? 'block' : 'none';
        document.querySelectorAll('.theme-btn').forEach(function(b) {
            b.classList.toggle('active', b.dataset.theme === name);
        });
    }

    // ==================== 页面切换 ====================
    function showPage(id) {
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById(id).classList.add('active');
    }

    // ==================== 全局状态 ====================
    var currentCategory = null;   // 'theory' / 'qiushi' / 'hot'
    var currentYear   = null;     // '2026' / '2025' / '2024'
    var currentIssue  = null;     // 期数id 或 文件id
    var currentSection = null;     // 板块id（理论基础知识用：section-xsd / section-mks）
    var currentMode   = null;
    var currentCards  = [];
    var currentIndex  = 0;
    var isFlipped    = false;
    var knownSet     = new Set();
    var wrongSet     = new Set();

    // ==================== 进度存储 ====================
    function getProg() {
        try { return JSON.parse(localStorage.getItem('zzll_progress') || '{}'); }
        catch(e) { return {}; }
    }

    function saveProg() {
        var p = getProg();
        knownSet.forEach(function(id) { if (!p[id]) p[id] = {}; p[id].known = true; });
        wrongSet.forEach(function(id) { if (!p[id]) p[id] = {}; p[id].wrong = true; });
        localStorage.setItem('zzll_progress', JSON.stringify(p));
    }

    function getCardProg(id) {
        return getProg()[id] || {};
    }

    // ==================== 统计浮窗 ====================
    function updateStats() {
        var sf = document.getElementById('stats-float');
        if (!sf) return;
        sf.style.display = 'flex';
        document.getElementById('stat-current').textContent = currentIndex + 1;
        document.getElementById('stat-total').textContent = currentCards.length;
        document.getElementById('stat-known').textContent = knownSet.size;
        document.getElementById('stat-wrong').textContent = wrongSet.size;
    }

    function hideStats() {
        var sf = document.getElementById('stats-float');
        if (sf) sf.style.display = 'none';
    }

    // ==================== 首页计数 ====================
    function updateHome() {
        // 理论基础知识 卡片数（所有板块相加）
        var theoryCount = 0;
        if (cardData.theory && cardData.theory.sections) {
            cardData.theory.sections.forEach(function(sec) {
                if (sec.cards) theoryCount += sec.cards.length;
            });
        }
        document.getElementById('theory-count').innerHTML =
            '<span class="stat-number">' + theoryCount + '</span><span class="stat-unit">热词</span>';

        // 求是 总期数
        var qsTotal = 0;
        if (cardData.qiushi && cardData.qiushi.years) {
            Object.values(cardData.qiushi.years).forEach(function(y) {
                if (y.issues) qsTotal += y.issues.length;
            });
        }
        document.getElementById('qiushi-count').innerHTML =
            '<span class="stat-number">' + qsTotal + '</span><span class="stat-unit">期</span>';

        // 热点文件 总文件数
        var hfTotal = 0;
        if (cardData.hot && cardData.hot.years) {
            Object.values(cardData.hot.years).forEach(function(y) {
                if (y.files) hfTotal += y.files.length;
            });
        }
        document.getElementById('hot-count').innerHTML =
            '<span class="stat-number">' + hfTotal + '</span><span class="stat-unit">文件</span>';
    }

    // ==================== 导航 ====================

    // 首页 → 各大卡片
    function goHome() {
        hideStats();
        currentCategory = null;
        currentYear = null;
        currentIssue = null;
        currentSection = null;
        currentMode = null;
        updateHome();
        showPage('page-home');
    }

    // 点击"理论基础知识" → 显示板块列表（新思想 / 马克思）
    function goToTheory() {
        currentCategory = 'theory';
        currentSection = null;
        // 渲染板块列表到 page-subjects
        var grid = document.getElementById('subjects-grid');
        grid.innerHTML = '';
        document.getElementById('subjects-title').textContent = '理论基础知识';
        document.getElementById('subjects-subtitle').textContent = '选择板块';
        if (cardData.theory && cardData.theory.sections) {
            cardData.theory.sections.forEach(function(sec) {
                var div = document.createElement('div');
                div.className = 'subject-card';
                var count = sec.cards ? sec.cards.length : 0;
                div.innerHTML = '<div class="subject-name">' + sec.name + '</div>'
                            + '<div class="subject-count">' + count + ' 张卡片</div>';
                div.onclick = function() {
                    currentSection = sec.id;
                    document.getElementById('mode-page-title').textContent = sec.name;
                    document.getElementById('mode-page-subtitle').textContent = '共 ' + count + ' 个热词';
                    showPage('page-modes');
                };
                grid.appendChild(div);
            });
        }
        showPage('page-subjects');
    }

    // 点击"求是" → 年份选择
    function goToQiushi() {
        currentCategory = 'qiushi';
        document.getElementById('years-title').textContent = '求是';
        document.getElementById('years-subtitle').textContent = '选择年份';
        renderYearCards('qiushi');
        showPage('page-years');
    }

    // 点击"热点文件" → 年份选择
    function goToHot() {
        currentCategory = 'hot';
        document.getElementById('years-title').textContent = '热点文件';
        document.getElementById('years-subtitle').textContent = '选择年份';
        renderYearCards('hot');
        showPage('page-years');
    }

    // 渲染年份选择卡片（倒序：2026 → 2025 → 2024）
    function renderYearCards(cat) {
        var data = cardData[cat];
        if (!data || !data.years) return;
        var grid = document.getElementById('years-grid');
        grid.innerHTML = '';
        // 年份倒序排列
        Object.entries(data.years).sort(function(a,b){ return b[0] - a[0]; }).forEach(function(entry) {
            var yearKey = entry[0];
            var yearData = entry[1];
            var div = document.createElement('div');
            div.className = 'subject-card';
            var count = 0;
            if (cat === 'qiushi' && yearData.issues) count = yearData.issues.length;
            if (cat === 'hot' && yearData.files) count = yearData.files.length;
            div.innerHTML = '<div class="subject-name">' + yearKey + '年</div>'
                          + '<div class="subject-count">' + count + (cat==='qiushi'?' 期':' 个文件') + '</div>';
            div.onclick = function() { goToYear(yearKey); };
            grid.appendChild(div);
        });
    }

    // 年份 → 期数/文件列表
    function goToYear(year) {
        currentYear = year;
        var data = cardData[currentCategory];
        if (!data || !data.years || !data.years[year]) return;
        var yearData = data.years[year];

        if (currentCategory === 'qiushi') {
            document.getElementById('issues-title').textContent = year + '年求是';
            document.getElementById('issues-subtitle').textContent = '选择期数';
            renderIssueCards(yearData.issues || [], '期');
        } else if (currentCategory === 'hot') {
            document.getElementById('issues-title').textContent = year + '年热点文件';
            document.getElementById('issues-subtitle').textContent = '选择文件';
            renderIssueCards(yearData.files || [], '文件');
        }
        showPage('page-issues');
    }

    // 渲染期数/文件列表卡片
    // 求是正序（第1期→第24期），热点文件倒序（最新在前）
    // title 为空时用默认格式 "YYYY年第X期" / "YYYY年第X个文件"
    function renderIssueCards(list, typeLabel) {
        var grid = document.getElementById('issues-grid');
        grid.innerHTML = '';
        // 根据分类决定排序
        var displayList = (currentCategory === 'qiushi') ? list : list.slice().reverse();
        displayList.forEach(function(item, idx) {
            var div = document.createElement('div');
            div.className = 'subject-card';
            var cardCount = item.cards ? item.cards.length : 0;
            // 处理空 title：生成默认格式
            var displayTitle = item.title;
            if (!displayTitle) {
                // 求原始索引（在原始 list 中的位置）
                var origIdx = list.indexOf(item);
                if (currentCategory === 'qiushi') {
                    displayTitle = currentYear + '年第' + (origIdx + 1) + '期';
                } else {
                    displayTitle = currentYear + '年第' + (origIdx + 1) + '个文件';
                }
            }
            div.innerHTML = '<div class="subject-name">' + displayTitle + '</div>'
                        + '<div class="subject-count">' + cardCount + ' 张卡片</div>';
            div.onclick = function() { goToIssue(item.id); };
            grid.appendChild(div);
        });
    }

    // 期数/文件 → 模式选择
    function goToIssue(issueId) {
        currentIssue = issueId;
        // 找到对应的标题（空时用默认格式）
        var title = issueId;
        var cat = currentCategory;
        var year = currentYear;
        if (cat && year && cardData[cat] && cardData[cat].years && cardData[cat].years[year]) {
            var yearData = cardData[cat].years[year];
            var list = cat==='qiushi' ? yearData.issues : yearData.files;
            if (list) {
                var found = list.find(function(x) { return x.id === issueId; });
                if (found) {
                    title = found.title;
                    if (!title) {
                        var origIdx = list.indexOf(found);
                        if (cat === 'qiushi') {
                            title = year + '年第' + (origIdx + 1) + '期';
                        } else {
                            title = year + '年第' + (origIdx + 1) + '个文件';
                        }
                    }
                }
            }
        }
        document.getElementById('mode-page-title').textContent = title;
        document.getElementById('mode-page-subtitle').textContent = '选择学习模式';
        showPage('page-modes');
    }

    // 返回逻辑
    function backFromYears() {
        goHome();
    }
    function backFromIssues() {
        if (currentCategory === 'qiushi') goToQiushi();
        else if (currentCategory === 'hot') goToHot();
        else goHome();
    }
    function backToHome() {
        goHome();
    }

    // ==================== 学习模式 ====================
    function getCardsFromState() {
        // 根据 currentCategory / currentSection / currentIssue 获取卡片列表
        if (currentCategory === 'theory') {
            // 理论基础知识：按板块取卡片
            if (currentSection) {
                var sec = cardData.theory.sections.find(function(s) { return s.id === currentSection; });
                return sec ? (sec.cards || []) : [];
            } else {
                // fallback：所有板块打平
                var all = [];
                if (cardData.theory.sections) {
                    cardData.theory.sections.forEach(function(s) {
                        if (s.cards) all = all.concat(s.cards);
                    });
                }
                return all;
            }
        }
        if (currentCategory === 'qiushi' && currentYear && currentIssue) {
            var y = cardData.qiushi.years[currentYear];
            if (y && y.issues) {
                var iss = y.issues.find(function(x) { return x.id === currentIssue; });
                return iss ? (iss.cards || []) : [];
            }
        }
        if (currentCategory === 'hot' && currentYear && currentIssue) {
            var y = cardData.hot.years[currentYear];
            if (y && y.files) {
                var f = y.files.find(function(x) { return x.id === currentIssue; });
                return f ? (f.cards || []) : [];
            }
        }
        return [];
    }

    function startMode(mode) {
        currentMode = mode;
        var cards = getCardsFromState();
        if (cards.length === 0 && mode !== 'wrong') {
            alert('该分类下暂无卡片，请先在 data.js 中填充内容！');
            return;
        }

        if (mode === 'random') {
            cards.sort(function() { return Math.random() - 0.5; });
        } else if (mode === 'wrong') {
            cards = cards.filter(function(c) { return getCardProg(c.id).wrong; });
            if (cards.length === 0) { alert('暂无错题！'); return; }
        }

        currentCards = cards;
        currentIndex = 0;
        isFlipped = false;
        knownSet = new Set();
        wrongSet = new Set();
        cards.forEach(function(c) {
            var p = getCardProg(c.id);
            if (p.known) knownSet.add(c.id);
            if (p.wrong) wrongSet.add(c.id);
        });

        if (mode === 'recite') {
            renderRecite();
            showPage('page-recite');
        } else {
            renderCard();
            updateStats();
            showPage('page-study');
        }
    }

    // ==================== 卡片渲染 ====================
    function renderCard() {
        if (currentCards.length === 0) return;
        var card = currentCards[currentIndex];
        if (!card) return;

        // 标题
        var titleText = '';
        if (currentCategory === 'theory') titleText = '理论基础知识';
        else if (currentCategory === 'qiushi') titleText = '求是 ' + (currentYear||'');
        else if (currentCategory === 'hot') titleText = '热点文件 ' + (currentYear||'');
        document.getElementById('study-title').textContent = titleText;
        document.getElementById('study-subtitle').textContent = (currentIndex + 1) + ' / ' + currentCards.length;

        // 正面
        var questionEl = document.getElementById('card-question');
        questionEl.innerHTML = card.question || '';

        // 清理旧标签（清理 card-answer 内部）
        var answerEl = document.getElementById('card-answer');
        var oldDiff = answerEl.querySelector('.card-difficulty'); if (oldDiff) oldDiff.remove();

        // 背面：答案+解析+拓展（流式排列，去掉标签）
        var answerHtml = '';
        // 答案正文（始终显示，即使为空也保留容器）
        answerHtml += '<div class="answer-body">' + (card.answer || '<span style="color:var(--text-secondary)">（暂无答案文本）</span>') + '</div>';
        // 解析
        if (card.analysis) {
            answerHtml += '<div class="analysis-section"><div class="section-label"><span class="info-icon">i</span>考点提示</div>' + card.analysis + '</div>';
        }
        // 拓展
        if (card.expansion) {
            answerHtml += '<div class="expansion-section"><div class="section-label">【拓展】</div>' + card.expansion + '</div>';
        }
        answerEl.innerHTML = answerHtml;

        document.getElementById('card-number').textContent = '#' + (currentIndex + 1);
        document.getElementById('card-number').style.left = '16px';
        document.getElementById('card-number').style.bottom = '12px';
        document.getElementById('card-number').style.top = 'auto';

        // 检测内容是否超高：超过 520px 则改为顶部对齐+滚动
        var cardFront = document.getElementById('card-question');
        var cardBack  = document.getElementById('card-answer');
        // 临时去掉 overflow 隐藏来测量自然高度
        cardFront.style.maxHeight = 'none'; cardBack.style.maxHeight = 'none';
        var qHeight = cardFront.scrollHeight;
        var aHeight = cardBack.scrollHeight;
        cardFront.style.maxHeight = '';
        cardBack.style.maxHeight = '';

        var CARD_H = 520;  // 与 CSS .card-wrapper height 一致
        // 短内容：居中（CSS justify-content:center）
        // 高内容：顶部对齐+滚动（加 .tall 切为 justify-content:flex-start）
        if (qHeight > CARD_H - 40) {
            cardFront.classList.add('tall');
        } else {
            cardFront.classList.remove('tall');
        }
        if (aHeight > CARD_H - 40) {
            cardBack.classList.add('tall');
        } else {
            cardBack.classList.remove('tall');
        }

        document.getElementById('card-inner').classList.remove('flipped');
        isFlipped = false;
        // 确保内容区域滚动到顶部
        document.getElementById('card-question').scrollTop = 0;
        document.getElementById('card-answer').scrollTop = 0;
        updateStats();
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
    }

    function nextCard() {
        if (currentIndex < currentCards.length - 1) {
            currentIndex++;
            renderCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard();
        }
    }

    function markKnown() {
        if (currentCards.length === 0) return;
        var card = currentCards[currentIndex];
        if (!card) return;
        knownSet.add(card.id);
        saveProg();
        updateStats();
        if (currentIndex < currentCards.length - 1) setTimeout(nextCard, 300);
    }

    function markUnknown() {
        if (currentCards.length === 0) return;
        var card = currentCards[currentIndex];
        if (!card) return;
        wrongSet.add(card.id);
        saveProg();
        updateStats();
        if (currentIndex < currentCards.length - 1) setTimeout(nextCard, 300);
    }

    // ==================== 背诵模式 ====================
    function renderRecite() {
        var cards = getCardsFromState();
        var titleText = '';
        if (currentCategory === 'theory') titleText = '理论基础知识';
        else if (currentCategory === 'qiushi') titleText = '求是 ' + (currentYear||'');
        else if (currentCategory === 'hot') titleText = '热点文件 ' + (currentYear||'');
        document.getElementById('recite-title').textContent = titleText + ' - 背诵模式';

        var list = document.getElementById('recite-list');
        list.innerHTML = '';
        cards.forEach(function(card) {
            var div = document.createElement('div');
            div.className = 'recite-item';
            var tagHtml = card.tagText ? ' <span style="color:var(--accent);font-size:0.75rem;margin-left:4px;">[' + card.tagText + ']</span>' : '';
            var qHtml = '<div class="recite-q">' + (card.question || '') + tagHtml + '</div>';
            var aHtml = '<div class="recite-a">' + (card.answer || '');
            if (card.analysis) aHtml += '<div style="margin-top:8px;padding:12px;background:rgba(124,77,255,0.08);border-left:3px solid rgba(124,77,255,0.4);border-radius:0 8px 8px 0;"><strong style="color:#7c4dff;">💡 考点提示</strong><br>' + card.analysis + '</div>';
            if (card.expansion) aHtml += '<div style="margin-top:6px;"><strong>【拓展】</strong>' + card.expansion + '</div>';
            aHtml += '</div>';
            div.innerHTML = qHtml + aHtml;
            div.onclick = function() { div.classList.toggle('expanded'); };
            list.appendChild(div);
        });
    }

    // ==================== 绑定事件 ====================
    function bindEvents() {
        // 首页三大卡片
        document.getElementById('card-theory').onclick   = goToTheory;
        document.getElementById('card-qiushi').onclick    = goToQiushi;
        document.getElementById('card-hot').onclick   = goToHot;

        // 返回按钮
        document.getElementById('back-from-years').onclick  = backFromYears;
        document.getElementById('back-from-subjects').onclick = goHome;
        document.getElementById('back-from-issues').onclick = backFromIssues;
        document.getElementById('back-to-issues').onclick   = function() {
            // 模式页 → 上一个页面
            if (currentCategory === 'theory') showPage('page-subjects');
            else backFromIssues();
        };
        document.getElementById('back-from-study').onclick = function() {
            hideStats();
            showPage('page-modes');
        };
        document.getElementById('back-from-recite').onclick = function() {
            showPage('page-modes');
        };

        // 模式选择
        document.getElementById('mode-card').onclick    = function() { startMode('card'); };
        document.getElementById('mode-recite').onclick  = function() { startMode('recite'); };
        document.getElementById('mode-random').onclick  = function() { startMode('random'); };
        document.getElementById('mode-wrong').onclick   = function() { startMode('wrong'); };

        // 学习按钮
        document.getElementById('btn-flip').onclick    = flipCard;
        document.getElementById('btn-prev').onclick    = prevCard;
        document.getElementById('btn-next').onclick    = nextCard;
        document.getElementById('btn-known').onclick    = markKnown;
        document.getElementById('btn-unknown').onclick  = markUnknown;

        // 卡片点击翻转
        document.getElementById('card-wrapper').onclick = function(e) {
            if (e.target.closest('.btn')) return;
            flipCard();
        };

        // 换肤
        document.querySelectorAll('.theme-btn').forEach(function(b) {
            b.onclick = function() { switchTheme(this.dataset.theme); };
        });
    }

    // ==================== 粒子背景 ====================
    function initParticles() {
        var canvas = document.getElementById('particles');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        if (!ctx) return;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        var colors = [
            {r:255,g:255,b:255}, {r:255,g:255,b:255}, {r:255,g:255,b:255}
        ];
        var particles = [];
        for (var i = 0; i < 30; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + Math.random() * 100,
                vx: (Math.random() - 0.5) * 0.5,
                vy: -(Math.random() * 0.8 + 0.2),
                r: Math.random() * 2 + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(function(p) {
                p.x += p.vx; p.y += p.vy;
                if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + p.color.r + ',' + p.color.g + ',' + p.color.b + ',0.6)';
                ctx.fill();
            });
        }
        animate();
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() {
        updateHome();
        bindEvents();
        initParticles();
        var savedTheme = localStorage.getItem('zzll_theme') || 'default';
        document.getElementById('glow-container').style.display = (savedTheme === 'skeu') ? 'block' : 'none';
    });
    </script>
</body>
